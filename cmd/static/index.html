<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nginx Request Attribution</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.8);
            --bg-card-hover: rgba(51, 65, 85, 0.9);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(148, 163, 184, 0.1);
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient-1: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gradient-2: linear-gradient(135deg, #06b6d4, #3b82f6);
            --gradient-3: linear-gradient(135deg, #10b981, #06b6d4);
            --gradient-4: linear-gradient(135deg, #f59e0b, #ef4444);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --radius-sm: 10px;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --bg-card-hover: rgba(248, 250, 252, 1);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.2);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Background decoration */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 32px 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
            backdrop-filter: blur(12px);
        }

        .theme-toggle:hover {
            background: var(--bg-card-hover);
            transform: scale(1.05);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .stat-card:nth-child(1)::before { background: var(--gradient-1); }
        .stat-card:nth-child(2)::before { background: var(--gradient-2); }
        .stat-card:nth-child(3)::before { background: var(--gradient-3); }
        .stat-card:nth-child(4)::before { background: var(--gradient-4); }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .stat-card .stat-icon {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .stat-card h3 {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -1px;
        }

        /* Filters Panel */
        .filters {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 32px;
        }

        .filters-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            cursor: pointer;
        }

        .filters-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filters-header .toggle-icon {
            font-size: 12px;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .filters-header .toggle-icon.collapsed {
            transform: rotate(-90deg);
        }

        .filter-body {
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            max-height: 400px;
            opacity: 1;
        }

        .filter-body.collapsed {
            max-height: 0;
            opacity: 0;
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.2s ease;
            outline: none;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .filter-group input::placeholder {
            color: var(--text-muted);
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            align-items: end;
            padding-top: 6px;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: #fff;
            box-shadow: 0 2px 12px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 6px;
            width: fit-content;
        }

        .tab {
            padding: 10px 24px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            user-select: none;
        }

        .tab:hover {
            color: var(--text-primary);
            background: var(--bg-secondary);
        }

        .tab.active {
            color: #fff;
            background: var(--gradient-1);
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        /* Panels */
        .panel {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Charts */
        .chart-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 28px;
        }

        .chart-box {
            min-height: 200px;
        }

        .chart-box h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bar-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bar-label {
            min-width: 130px;
            font-size: 13px;
            font-weight: 500;
            text-align: right;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-secondary);
        }

        .bar-track {
            flex: 1;
            height: 28px;
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .bar-fill {
            height: 100%;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding-left: 12px;
            font-size: 12px;
            color: #fff;
            font-weight: 600;
            min-width: fit-content;
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bar-fill.grad-1 { background: var(--gradient-1); }
        .bar-fill.grad-2 { background: var(--gradient-2); }
        .bar-fill.grad-3 { background: var(--gradient-3); }
        .bar-fill.grad-4 { background: var(--gradient-4); }
        .bar-fill.grad-5 { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
        .bar-fill.grad-6 { background: linear-gradient(135deg, #14b8a6, #a3e635); }
        .bar-fill.grad-7 { background: linear-gradient(135deg, #f97316, #eab308); }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--bg-secondary);
            position: sticky;
            top: 0;
        }

        tr {
            transition: background 0.15s ease;
        }

        tr:hover {
            background: var(--bg-card-hover);
        }

        td {
            color: var(--text-primary);
        }

        .status-badge {
            display: inline-flex;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-2xx { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .status-3xx { background: rgba(99, 102, 241, 0.15); color: #818cf8; }
        .status-4xx { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .status-5xx { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        /* Pagination */
        .pagination {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 20px;
            justify-content: center;
        }

        .page-info {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* No data state */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header h1 { font-size: 22px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-card { padding: 16px; }
            .stat-card .value { font-size: 24px; }
            .chart-container { grid-template-columns: 1fr; }
            .filter-row { grid-template-columns: 1fr 1fr; }
            .tabs { width: 100%; }
            .tab { flex: 1; text-align: center; padding: 10px 12px; font-size: 13px; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .filter-row { grid-template-columns: 1fr; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Nginx Request Attribution</h1>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌓</button>
            </div>
        </div>

        <div class="stats-grid" id="statsCards"></div>

        <div class="filters">
            <div class="filters-header" onclick="toggleFilters()">
                <h2><span>🔍</span> 篩選條件 Filters</h2>
                <span class="toggle-icon" id="filterToggleIcon">▼</span>
            </div>
            <div class="filter-body" id="filterBody">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>開始日期 Start</label>
                        <input type="date" id="filterStart">
                    </div>
                    <div class="filter-group">
                        <label>結束日期 End</label>
                        <input type="date" id="filterEnd">
                    </div>
                    <div class="filter-group">
                        <label>IP</label>
                        <input type="text" id="filterIP" placeholder="e.g. 192.168">
                    </div>
                    <div class="filter-group">
                        <label>路徑 Path</label>
                        <input type="text" id="filterPath" placeholder="e.g. /api">
                    </div>
                    <div class="filter-group">
                        <label>域名 Domain</label>
                        <input type="text" id="filterDomain" placeholder="e.g. example.com">
                    </div>
                    <div class="filter-group">
                        <label>查詢 Query</label>
                        <input type="text" id="filterQuery" placeholder="e.g. id=123">
                    </div>
                    <div class="filter-group">
                        <label>OS</label>
                        <select id="filterOS">
                            <option value="">全部 All</option>
                            <option value="Windows">Windows</option>
                            <option value="macOS">macOS</option>
                            <option value="Linux">Linux</option>
                            <option value="iOS">iOS</option>
                            <option value="Android">Android</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>瀏覽器 Browser</label>
                        <select id="filterBrowser">
                            <option value="">全部 All</option>
                            <option value="Chrome">Chrome</option>
                            <option value="Firefox">Firefox</option>
                            <option value="Safari">Safari</option>
                            <option value="Edge">Edge</option>
                            <option value="Opera">Opera</option>
                            <option value="Bot">Bot</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>狀態碼 Status</label>
                        <input type="number" id="filterStatus" placeholder="e.g. 200">
                    </div>
                    <div class="filter-group">
                        <label>關鍵詞 Keyword</label>
                        <input type="text" id="filterKeyword" placeholder="keyword">
                    </div>
                    <div class="filter-actions">
                        <button class="btn btn-primary" onclick="applyFilters()">搜尋 Search</button>
                        <button class="btn btn-secondary" onclick="clearFilters()">清除 Clear</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="overview" onclick="switchTab('overview')">📈 總覽 Overview</div>
            <div class="tab" data-tab="requests" onclick="switchTab('requests')">📋 請求列表 Requests</div>
        </div>

        <div id="tab-overview" class="panel">
            <div class="chart-container" id="charts"></div>
        </div>

        <div id="tab-requests" class="panel" style="display:none;">
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>時間 Time</th>
                            <th>IP</th>
                            <th>Method</th>
                            <th>路徑 Path</th>
                            <th>Query</th>
                            <th>狀態 Status</th>
                            <th>域名 Domain</th>
                            <th>OS</th>
                            <th>瀏覽器 Browser</th>
                            <th>UA</th>
                        </tr>
                    </thead>
                    <tbody id="requestsBody"></tbody>
                </table>
            </div>
            <div class="pagination">
                <button class="btn btn-secondary" onclick="prevPage()">← 上一頁</button>
                <span class="page-info" id="pageInfo">Page 1</span>
                <button class="btn btn-secondary" onclick="nextPage()">下一頁 →</button>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const pageSize = 50;
        let totalResults = 0;

        // Theme management
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.querySelector('.theme-toggle').textContent = next === 'light' ? '🌙' : '☀️';
        }

        (function initTheme() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            document.addEventListener('DOMContentLoaded', function() {
                document.querySelector('.theme-toggle').textContent = saved === 'light' ? '🌙' : '☀️';
            });
        })();

        // Filter toggle
        function toggleFilters() {
            const body = document.getElementById('filterBody');
            const icon = document.getElementById('filterToggleIcon');
            body.classList.toggle('collapsed');
            icon.classList.toggle('collapsed');
        }

        function getFilters() {
            const params = new URLSearchParams();
            const fields = {
                start: 'filterStart', end: 'filterEnd', ip: 'filterIP',
                path: 'filterPath', domain: 'filterDomain', query: 'filterQuery',
                os: 'filterOS', browser: 'filterBrowser', status: 'filterStatus',
                keyword: 'filterKeyword'
            };
            for (const [key, id] of Object.entries(fields)) {
                const val = document.getElementById(id).value;
                if (val) params.set(key, val);
            }
            return params;
        }

        function applyFilters() {
            currentPage = 1;
            loadStats();
            loadRequests();
        }

        function clearFilters() {
            document.querySelectorAll('.filters input, .filters select').forEach(el => el.value = '');
            applyFilters();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
            document.getElementById('tab-overview').style.display = tab === 'overview' ? 'block' : 'none';
            document.getElementById('tab-requests').style.display = tab === 'requests' ? 'block' : 'none';
            if (tab === 'requests') loadRequests();
        }

        async function loadStats() {
            const params = getFilters();
            try {
                const res = await fetch('/api/stats?' + params.toString());
                const data = await res.json();
                renderStatsCards(data);
                renderCharts(data);
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }

        function renderStatsCards(data) {
            const cards = document.getElementById('statsCards');
            const items = [
                { icon: '📊', label: '總請求數 Total Requests', value: data.total_requests ? data.total_requests.toLocaleString() : '0' },
                { icon: '🛤️', label: '唯一路徑 Unique Paths', value: data.top_paths ? data.top_paths.length : 0 },
                { icon: '🌐', label: '唯一IP Unique IPs', value: data.top_ips ? data.top_ips.length : 0 },
                { icon: '🏷️', label: '唯一域名 Domains', value: data.top_domains ? data.top_domains.length : 0 }
            ];
            cards.innerHTML = items.map(function(item) {
                return '<div class="stat-card"><div class="stat-icon">' + item.icon + '</div><h3>' + item.label + '</h3><div class="value">' + item.value + '</div></div>';
            }).join('');
        }

        var gradients = ['grad-1', 'grad-2', 'grad-3', 'grad-4', 'grad-5', 'grad-6', 'grad-7'];

        function renderBarChart(title, items, gradIdx) {
            if (!items || items.length === 0) {
                return '<div class="chart-box"><h3>' + title + '</h3><div class="empty-state"><div class="icon">📭</div><p>暫無數據 No data</p></div></div>';
            }
            var max = items[0].count;
            var grad = gradients[gradIdx % gradients.length];
            var bars = items.slice(0, 10).map(function(item) {
                var pct = Math.max((item.count / max) * 100, 10);
                return '<div class="bar-item"><span class="bar-label" title="' + escapeHtml(item.name) + '">' + escapeHtml(item.name || '(empty)') + '</span><div class="bar-track"><div class="bar-fill ' + grad + '" style="width:' + pct + '%">' + item.count.toLocaleString() + '</div></div></div>';
            }).join('');
            return '<div class="chart-box"><h3>' + title + '</h3><div class="bar-chart">' + bars + '</div></div>';
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function renderCharts(data) {
            var container = document.getElementById('charts');
            container.innerHTML =
                renderBarChart('🛤️ 熱門路徑 Top Paths', data.top_paths, 0) +
                renderBarChart('🌐 熱門IP Top IPs', data.top_ips, 1) +
                renderBarChart('🏷️ 域名 Domains', data.top_domains, 2) +
                renderBarChart('💻 作業系統 OS', data.top_os, 3) +
                renderBarChart('🌍 瀏覽器 Browsers', data.top_browsers, 4) +
                renderBarChart('📊 狀態碼 Status Codes', data.status_codes, 5) +
                renderBarChart('🔑 關鍵詞 Keywords', data.top_keywords, 6);
        }

        function getStatusClass(status) {
            if (status >= 200 && status < 300) return 'status-2xx';
            if (status >= 300 && status < 400) return 'status-3xx';
            if (status >= 400 && status < 500) return 'status-4xx';
            return 'status-5xx';
        }

        async function loadRequests() {
            var params = getFilters();
            params.set('limit', pageSize);
            params.set('offset', (currentPage - 1) * pageSize);
            try {
                var res = await fetch('/api/requests?' + params.toString());
                var data = await res.json();
                totalResults = data.total;
                renderRequests(data.rows);
                document.getElementById('pageInfo').textContent =
                    '第 ' + currentPage + ' 頁 / 共 ' + Math.ceil(totalResults / pageSize) + ' 頁 (' + totalResults + ' 條)';
            } catch (e) {
                console.error('Failed to load requests:', e);
            }
        }

        function renderRequests(rows) {
            var tbody = document.getElementById('requestsBody');
            if (!rows || rows.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10"><div class="empty-state"><div class="icon">📭</div><p>暫無數據 No data</p></div></td></tr>';
                return;
            }
            tbody.innerHTML = rows.map(function(r) {
                return '<tr>' +
                    '<td>' + new Date(r.timestamp).toLocaleString() + '</td>' +
                    '<td><code>' + escapeHtml(r.ip) + '</code></td>' +
                    '<td><strong>' + escapeHtml(r.method) + '</strong></td>' +
                    '<td title="' + escapeHtml(r.path) + '">' + escapeHtml(r.path.length > 40 ? r.path.slice(0, 40) + '…' : r.path) + '</td>' +
                    '<td title="' + escapeHtml(r.query || '') + '">' + (r.query ? escapeHtml(r.query.length > 20 ? r.query.slice(0, 20) + '…' : r.query) : '-') + '</td>' +
                    '<td><span class="status-badge ' + getStatusClass(r.status) + '">' + r.status + '</span></td>' +
                    '<td>' + escapeHtml(r.domain || '-') + '</td>' +
                    '<td>' + escapeHtml(r.os) + '</td>' +
                    '<td>' + escapeHtml(r.browser) + '</td>' +
                    '<td title="' + escapeHtml(r.user_agent || '') + '">' + escapeHtml((r.user_agent || '').slice(0, 30)) + '…</td>' +
                    '</tr>';
            }).join('');
        }

        function prevPage() { if (currentPage > 1) { currentPage--; loadRequests(); } }
        function nextPage() { if (currentPage * pageSize < totalResults) { currentPage++; loadRequests(); } }

        // Initial load
        loadStats();
    </script>
</body>
</html>
