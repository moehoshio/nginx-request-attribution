<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Request Attribution</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.8);
            --bg-card-hover: rgba(51, 65, 85, 0.9);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(148, 163, 184, 0.1);
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient-1: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gradient-2: linear-gradient(135deg, #06b6d4, #3b82f6);
            --gradient-3: linear-gradient(135deg, #10b981, #06b6d4);
            --gradient-4: linear-gradient(135deg, #f59e0b, #ef4444);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --radius-sm: 10px;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --bg-card-hover: rgba(248, 250, 252, 1);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.2);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Background decoration */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 32px 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .language-switcher,
        .theme-toggle {
            height: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            backdrop-filter: blur(12px);
            transition: all 0.2s ease;
        }

        .language-switcher {
            padding: 0 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .language-switcher:hover,
        .theme-toggle:hover {
            background: var(--bg-card-hover);
        }

        .theme-toggle {
            width: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .stat-card:nth-child(1)::before { background: var(--gradient-1); }
        .stat-card:nth-child(2)::before { background: var(--gradient-2); }
        .stat-card:nth-child(3)::before { background: var(--gradient-3); }
        .stat-card:nth-child(4)::before { background: var(--gradient-4); }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .stat-card .stat-icon {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .stat-card h3 {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -1px;
        }

        /* Filters Panel */
        .filters {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 32px;
        }

        .filters-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            cursor: pointer;
        }

        .filters-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filters-header .toggle-icon {
            font-size: 12px;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .filters-header .toggle-icon.collapsed {
            transform: rotate(-90deg);
        }

        .filter-body {
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            max-height: 400px;
            opacity: 1;
        }

        .filter-body.collapsed {
            max-height: 0;
            opacity: 0;
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.2s ease;
            outline: none;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .filter-group input::placeholder {
            color: var(--text-muted);
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            align-items: end;
            padding-top: 6px;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: #fff;
            box-shadow: 0 2px 12px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 6px;
            width: fit-content;
        }

        .tab {
            padding: 10px 24px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            user-select: none;
        }

        .tab:hover {
            color: var(--text-primary);
            background: var(--bg-secondary);
        }

        .tab.active {
            color: #fff;
            background: var(--gradient-1);
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        /* Panels */
        .panel {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Charts */
        .chart-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 28px;
        }

        .chart-box {
            min-height: 200px;
        }

        .chart-box h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bar-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bar-label {
            min-width: 130px;
            font-size: 13px;
            font-weight: 500;
            text-align: right;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-secondary);
        }

        .bar-track {
            flex: 1;
            height: 28px;
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .bar-fill {
            height: 100%;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding-left: 12px;
            font-size: 12px;
            color: #fff;
            font-weight: 600;
            min-width: fit-content;
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bar-fill.grad-1 { background: var(--gradient-1); }
        .bar-fill.grad-2 { background: var(--gradient-2); }
        .bar-fill.grad-3 { background: var(--gradient-3); }
        .bar-fill.grad-4 { background: var(--gradient-4); }
        .bar-fill.grad-5 { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
        .bar-fill.grad-6 { background: linear-gradient(135deg, #14b8a6, #a3e635); }
        .bar-fill.grad-7 { background: linear-gradient(135deg, #f97316, #eab308); }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--bg-secondary);
            position: sticky;
            top: 0;
        }

        tr {
            transition: background 0.15s ease;
        }

        tr:hover {
            background: var(--bg-card-hover);
        }

        td {
            color: var(--text-primary);
        }

        .status-badge {
            display: inline-flex;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-2xx { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .status-3xx { background: rgba(99, 102, 241, 0.15); color: #818cf8; }
        .status-4xx { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .status-5xx { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        /* Pagination */
        .pagination {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 20px;
            justify-content: center;
        }

        .page-info {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* No data state */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { flex-direction: column; align-items: flex-start; }
            .header h1 { font-size: 22px; }
            .header-actions { width: 100%; justify-content: flex-end; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-card { padding: 16px; }
            .stat-card .value { font-size: 24px; }
            .chart-container { grid-template-columns: 1fr; }
            .filter-row { grid-template-columns: 1fr 1fr; }
            .tabs { width: 100%; }
            .tab { flex: 1; text-align: center; padding: 10px 12px; font-size: 13px; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .filter-row { grid-template-columns: 1fr; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* Auth overlay (Phase 2) */
        .auth-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--bg-primary);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: var(--bg-card); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 32px; width: 100%; max-width: 380px;
        }
        .auth-card h2 { margin-bottom: 8px; color: var(--text-primary); }
        .auth-card .subtitle { color: var(--text-secondary); margin-bottom: 24px; font-size: 14px; }
        .auth-card label { display: block; color: var(--text-secondary); font-size: 13px; margin: 12px 0 6px; }
        .auth-card input {
            width: 100%; padding: 10px 12px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text-primary); font-size: 14px;
        }
        .auth-card input:focus { outline: none; border-color: var(--accent); }
        .auth-card .btn-primary { width: 100%; margin-top: 20px; }
        .auth-card .error {
            color: var(--danger); font-size: 13px; min-height: 18px; margin-top: 12px;
        }
        .user-menu {
            display: flex; align-items: center; gap: 10px;
            color: var(--text-secondary); font-size: 13px;
        }
        .user-menu .badge {
            background: var(--accent); color: #fff;
            padding: 2px 8px; border-radius: 999px; font-size: 11px; text-transform: uppercase;
        }
        .users-table { width: 100%; }
        .users-table th, .users-table td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        .users-table .actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .users-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; align-items: end; margin-bottom: 20px; }
        .users-form input, .users-form select {
            padding: 8px 10px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text-primary); font-size: 14px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Auth overlay: shown until /api/auth/me succeeds. -->
    <div id="authOverlay" class="auth-overlay hidden">
        <div class="auth-card">
            <h2 data-i18n="auth_signin"></h2>
            <p class="subtitle" data-i18n="auth_signin_subtitle"></p>
            <form id="loginForm" onsubmit="return doLogin(event)">
                <label data-i18n="auth_username"></label>
                <input type="text" id="loginUsername" autocomplete="username" required>
                <label data-i18n="auth_password"></label>
                <input type="password" id="loginPassword" autocomplete="current-password" required>
                <button type="submit" class="btn btn-primary" data-i18n="auth_signin_btn"></button>
                <div id="loginError" class="error"></div>
            </form>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>📊 Web Request Attribution</h1>
            <div class="header-actions">
                <div id="userMenu" class="user-menu hidden">
                    <span id="userMenuName"></span>
                    <span id="userMenuRole" class="badge"></span>
                    <button class="btn btn-secondary" onclick="changeOwnPassword()" data-i18n="auth_change_password"></button>
                    <button class="btn btn-secondary" onclick="doLogout()" data-i18n="auth_logout"></button>
                </div>
                <select id="languageSwitcher" class="language-switcher" onchange="setLanguage(this.value)" data-i18n-title="language" data-i18n-aria-label="language">
                    <option value="zh-TW">繁體中文</option>
                    <option value="zh-CN">简体中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                </select>
                <button class="theme-toggle" onclick="toggleTheme()" data-i18n-title="toggle_theme" data-i18n-aria-label="toggle_theme">🌓</button>
            </div>
        </div>

        <div class="stats-grid" id="statsCards"></div>

        <div class="filters">
            <div class="filters-header" onclick="toggleFilters()">
                <h2><span>🔍</span> <span data-i18n="filters_title"></span></h2>
                <span class="toggle-icon" id="filterToggleIcon">▼</span>
            </div>
            <div class="filter-body" id="filterBody">
                <div class="filter-row">
                    <div class="filter-group">
                        <label data-i18n="start_date"></label>
                        <input type="date" id="filterStart">
                    </div>
                    <div class="filter-group">
                        <label data-i18n="end_date"></label>
                        <input type="date" id="filterEnd">
                    </div>
                    <div class="filter-group">
                        <label data-i18n="ip"></label>
                        <input type="text" id="filterIP" data-i18n-placeholder="ip_placeholder">
                    </div>
                    <div class="filter-group">
                        <label data-i18n="path"></label>
                        <input type="text" id="filterPath" data-i18n-placeholder="path_placeholder">
                    </div>
                    <div class="filter-group">
                        <label data-i18n="domain"></label>
                        <input type="text" id="filterDomain" data-i18n-placeholder="domain_placeholder">
                    </div>
                    <div class="filter-group">
                        <label data-i18n="query"></label>
                        <input type="text" id="filterQuery" data-i18n-placeholder="query_placeholder">
                    </div>
                    <div class="filter-group">
                        <label data-i18n="os"></label>
                        <select id="filterOS">
                            <option value="" data-i18n="all"></option>
                            <option value="Windows">Windows</option>
                            <option value="macOS">macOS</option>
                            <option value="Linux">Linux</option>
                            <option value="iOS">iOS</option>
                            <option value="Android">Android</option>
                            <option value="Other" data-i18n="other"></option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label data-i18n="browser"></label>
                        <select id="filterBrowser">
                            <option value="" data-i18n="all"></option>
                            <option value="Chrome">Chrome</option>
                            <option value="Firefox">Firefox</option>
                            <option value="Safari">Safari</option>
                            <option value="Edge">Edge</option>
                            <option value="Opera">Opera</option>
                            <option value="Bot">Bot</option>
                            <option value="Other" data-i18n="other"></option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label data-i18n="status_code"></label>
                        <input type="number" id="filterStatus" data-i18n-placeholder="status_placeholder">
                    </div>
                    <div class="filter-group">
                        <label data-i18n="keyword"></label>
                        <input type="text" id="filterKeyword" data-i18n-placeholder="keyword_placeholder">
                    </div>
                    <div class="filter-actions">
                        <button class="btn btn-primary" onclick="applyFilters()" data-i18n="search"></button>
                        <button class="btn btn-secondary" onclick="clearFilters()" data-i18n="clear"></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="overview" onclick="switchTab('overview')"><span aria-hidden="true">📈</span> <span data-i18n="tab_overview"></span></div>
            <div class="tab" data-tab="requests" onclick="switchTab('requests')"><span aria-hidden="true">📋</span> <span data-i18n="tab_requests"></span></div>
            <div class="tab hidden" id="tabUsersHandle" data-tab="users" onclick="switchTab('users')"><span aria-hidden="true">👥</span> <span data-i18n="tab_users"></span></div>
            <div class="tab hidden" id="tabSettingsHandle" data-tab="settings" onclick="switchTab('settings')"><span aria-hidden="true">⚙️</span> <span data-i18n="tab_settings"></span></div>
        </div>

        <div id="tab-overview" class="panel">
            <div class="chart-container" id="charts"></div>
        </div>

        <div id="tab-requests" class="panel" style="display:none;">
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th data-i18n="time"></th>
                            <th data-i18n="ip"></th>
                            <th data-i18n="method"></th>
                            <th data-i18n="path"></th>
                            <th data-i18n="query"></th>
                            <th data-i18n="status"></th>
                            <th data-i18n="domain"></th>
                            <th data-i18n="os"></th>

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        function mapLanguage(lang) {
            if (!lang) return null;
            const normalized = lang.toLowerCase();
            if (normalized === 'zh-cn' || normalized === 'zh-sg' || normalized === 'zh-hans') return 'zh-CN';
            if (normalized.startsWith('zh')) return 'zh-TW';
            if (normalized.startsWith('ja')) return 'ja';
            if (normalized.startsWith('en')) return 'en';
            return null;
        }

        function getInitialLanguage() {
            const savedLang = localStorage.getItem('lang');
            if (savedLang && i18n[savedLang]) return savedLang;
            const browserLanguages = Array.isArray(navigator.languages) && navigator.languages.length
                ? navigator.languages
                : [navigator.language];
            for (const lang of browserLanguages) {
                const mapped = mapLanguage(lang);
                if (mapped) return mapped;
            }
            return 'en';
        }

        function t(key, vars) {
            const text = (i18n[currentLang] && i18n[currentLang][key]) || i18n.en[key] || key;
            if (!vars) return text;
            return text.replace(/\{(\w+)\}/g, function(_, name) {
                return Object.prototype.hasOwnProperty.call(vars, name) ? vars[name] : _;
            });
        }

        function updatePageInfo() {
            const totalPages = Math.max(Math.ceil(totalResults / pageSize), 1);
            document.getElementById('pageInfo').textContent = t('page_info', {
                current: currentPage,
                total: totalPages,
                count: totalResults
            });
        }

        function applyLanguage() {
            document.documentElement.lang = currentLang;
            document.querySelectorAll('[data-i18n]').forEach(function(el) {
                el.textContent = t(el.dataset.i18n);

            document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
                el.placeholder = t(el.dataset.i18nPlaceholder);
            });
            document.querySelectorAll('[data-i18n-title]').forEach(function(el) {
                el.title = t(el.dataset.i18nTitle);
            });
            document.querySelectorAll('[data-i18n-aria-label]').forEach(function(el) {
                el.setAttribute('aria-label', t(el.dataset.i18nAriaLabel));
            });
            const switcher = document.getElementById('languageSwitcher');
            if (switcher) switcher.value = currentLang;
            if (lastStatsData) {
                renderStatsCards(lastStatsData);
                renderCharts(lastStatsData);
            }

            }

        function setLanguage(lang) {
            currentLang = i18n[lang] ? lang : 'en';

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');

        function getFilters() {
            const params = new URLSearchParams();
            const fields = {
                start: 'filterStart', end: 'filterEnd', ip: 'filterIP',
                path: 'filterPath', domain: 'filterDomain', query: 'filterQuery',
                os: 'filterOS', browser: 'filterBrowser', status: 'filterStatus',
                keyword: 'filterKeyword'
            };
            for (const [key, id] of Object.entries(fields)) {
                const val = document.getElementById(id).value;
                if (val) params.set(key, val);

            loadRequests();

        function renderStatsCards(data) {
            const cards = document.getElementById('statsCards');

                { icon: '📊', labelKey: 'total_requests', value: data.total_requests ? data.total_requests.toLocaleString(currentLang) : '0' },

        function renderBarChart(icon, titleKey, items, gradIdx) {
            const title = icon + ' ' + t(titleKey);
            if (!items || items.length === 0) {
                return '<div class="chart-box"><h3>' + title + '</h3><div class="empty-state"><div class="icon">📭</div><p>' + t('no_data') + '</p></div></div>';
            }
            const max = items[0].count;
            const grad = gradients[gradIdx % gradients.length];
            const bars = items.slice(0, 10).map(function(item) {
                const pct = Math.max((item.count / max) * 100, 10);

        function getStatusClass(status) {
            if (status >= 200 && status < 300) return 'status-2xx';
            if (status >= 300 && status < 400) return 'status-3xx';
            if (status >= 400 && status < 500) return 'status-4xx';
            return 'status-5xx';
        }

        async function loadRequests() {
            const params = getFilters();
            params.set('limit', pageSize);
            params.set('offset', (currentPage - 1) * pageSize);
            try {
                const res = await authFetch('/api/requests?' + params.toString());
                const data = await res.json();
                totalResults = data.total || 0;

        function renderRequests(rows) {
            const tbody = document.getElementById('requestsBody');
            if (!rows || rows.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10"><div class="empty-state"><div class="icon">📭</div><p>' + t('no_data') + '</p></div></td></tr>';

                    '<td title="' + escapeHtml(r.query || '') + '">' + (r.query ? escapeHtml(r.query.length > 20 ? r.query.slice(0, 20) + '…' : r.query) : '-') + '</td>' +

        function prevPage() {
            if (currentPage > 1) {

        function nextPage() {

            }
        }

        // ---- Auth (Phase 2) -------------------------------------------------

        // Reads a cookie by name. Used to pull the CSRF cookie value
        // for the X-CSRF-Token header (double-submit cookie pattern).
        function getCookie(name) {
            const parts = document.cookie.split('; ');
            for (const p of parts) {
                const i = p.indexOf('=');
                if (i > 0 && p.substring(0, i) === name) {
                    return decodeURIComponent(p.substring(i + 1));
                }
            }
            return '';
        }

        let currentUser = null;

        // authFetch is a thin wrapper around fetch() that:
        //  - always sends cookies (same-origin), so the session cookie travels
        //  - sets X-CSRF-Token on unsafe methods so the server's CSRF check passes
        //  - returns the underlying Response so callers handle status themselves
        async function authFetch(url, opts) {
            opts = opts || {};
            opts.credentials = 'same-origin';
            const method = (opts.method || 'GET').toUpperCase();
            if (method !== 'GET' && method !== 'HEAD' && method !== 'OPTIONS') {
                opts.headers = opts.headers || {};
                opts.headers['X-CSRF-Token'] = getCookie('war_csrf');
            }
            const res = await fetch(url, opts);
            if (res.status === 401) {
                // Session lapsed / never existed: bounce to login.
                showLogin();
            }
            return res;
        }

        function showLogin() {
            document.getElementById('authOverlay').classList.remove('hidden');
            document.getElementById('userMenu').classList.add('hidden');
            document.getElementById('tabUsersHandle').classList.add('hidden');
            document.getElementById('tabSettingsHandle').classList.add('hidden');
            currentUser = null;
        }

        function hideLogin() {
            document.getElementById('authOverlay').classList.add('hidden');
        }

        function applyUserToHeader(u) {
            currentUser = u;
            const menu = document.getElementById('userMenu');
            menu.classList.remove('hidden');
            document.getElementById('userMenuName').textContent = u.username;
            document.getElementById('userMenuRole').textContent = u.role;
            if (u.role === 'admin') {
                document.getElementById('tabUsersHandle').classList.remove('hidden');
                document.getElementById('tabSettingsHandle').classList.remove('hidden');
            } else {
                document.getElementById('tabUsersHandle').classList.add('hidden');
                document.getElementById('tabSettingsHandle').classList.add('hidden');
            }
        }

        async function checkSession() {
            try {
                const res = await fetch('/api/auth/me', { credentials: 'same-origin' });
                if (!res.ok) { showLogin(); return false; }
                const data = await res.json();
                if (!data.user) { showLogin(); return false; }
                applyUserToHeader(data.user);
                hideLogin();
                return true;
            } catch (e) {
                showLogin();
                return false;
            }
        }

        async function doLogin(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errEl = document.getElementById('loginError');
            errEl.textContent = '';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });
                if (!res.ok) {
                    errEl.textContent = t('auth_invalid');
                    return false;
                }
                const data = await res.json();
                applyUserToHeader(data.user);
                hideLogin();
                document.getElementById('loginPassword').value = '';
                loadStats();
                return false;
            } catch (e) {
                errEl.textContent = t('auth_invalid');
                return false;
            }
        }

        async function doLogout() {
            await authFetch('/api/auth/logout', { method: 'POST' });
            showLogin();
        }

        async function changeOwnPassword() {
            const cur = prompt(t('auth_current_password'));
            if (cur === null) return;
            const next = prompt(t('auth_new_password'));
            if (next === null) return;
            const res = await authFetch('/api/users/me/password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ current_password: cur, new_password: next })
            });
            if (!res.ok) {
                const data = await res.json().catch(function() { return {}; });
                alert(data.error || 'error');
                return;
            }
            // Server has invalidated the session; force re-login.
            showLogin();
        }

        // ---- Users admin panel (admin only) ---------------------------------

            body.innerHTML = (data.users || []).map(function(u) {

                const statusLabel = u.disabled ? t('users_disabled') : t('users_active');
                const toggleLabel = u.disabled ? t('users_enable') : t('users_disable');
                const roleSwitchLabel = u.role === 'admin' ? t('users_make_viewer') : t('users_make_admin');
                const targetRole = u.role === 'admin' ? 'viewer' : 'admin';
                const isSelf = currentUser && currentUser.id === u.id;
                const disableBtn = isSelf ? '' : '<button class="btn btn-secondary" onclick="toggleUserDisabled(' + u.id + ',' + (!u.disabled) + ')">' + escapeHtml(toggleLabel) + '</button>';
                const deleteBtn = isSelf ? '' : '<button class="btn btn-secondary" onclick="deleteUser(' + u.id + ')">' + escapeHtml(t('users_delete')) + '</button>';
                const roleBtn = '<button class="btn btn-secondary" onclick="setUserRole(' + u.id + ',\'' + targetRole + '\')">' + escapeHtml(roleSwitchLabel) + '</button>';

        async function createUser() {

            const password = document.getElementById('newUserPassword').value;
            const role = document.getElementById('newUserRole').value;
            const errEl = document.getElementById('usersError');
            errEl.textContent = '';
            if (!username || !password) { errEl.textContent = 'username/password required'; return; }
            const res = await authFetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },

                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ disabled: disabled })

        // ---- Settings panel (admin only) ------------------------------------

        let settingsSchema = null;
        let settingsSources = [];

        function escapeAttr(s) {
            return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        }

        function renderSourceRows() {
            const host = document.getElementById('settingsSources');
            const engineOpts = (settingsSchema && settingsSchema.engines || ['auto','nginx','apache','custom']);
            const protoOpts = (settingsSchema && settingsSchema.syslog_protos || ['udp','tcp']);
            host.innerHTML = settingsSources.map(function(s, i) {
                const presets = (s.format && s.format.engine === 'apache'
                    ? (settingsSchema && settingsSchema.apache_presets || ['common','combined','vhost_combined'])
                    : (settingsSchema && settingsSchema.nginx_presets || ['combined','vhost_combined']));
                const engineSelect = engineOpts.map(function(e) {
                    return '<option value="' + e + '"' + (s.format && s.format.engine === e ? ' selected' : '') + '>' + e + '</option>';
                }).join('');
                const presetSelect = presets.map(function(p) {
                    return '<option value="' + p + '"' + (s.format && s.format.preset === p ? ' selected' : '') + '>' + p + '</option>';
                }).join('');
                const protoSelect = protoOpts.map(function(p) {
                    return '<option value="' + p + '"' + (s.proto === p ? ' selected' : '') + '>' + p + '</option>';
                }).join('');
                const isFile = s.type === 'file';
                const isDir = s.type === 'dir';
                const isSyslog = s.type === 'syslog';
                const isCustom = s.format && s.format.engine === 'custom';
                let typeBlock;
                if (isFile) {
                    typeBlock =
                        '<div style="grid-column:span 2;"><label data-i18n="settings_path"></label><input type="text" data-field="path" value="' + escapeAttr(s.path || '') + '"></div>' +
                        '<div><label><input type="checkbox" data-field="read_compressed"' + (s.read_compressed ? ' checked' : '') + '> <span data-i18n="settings_read_compressed"></span></label></div>';
                } else if (isDir) {
                    typeBlock =
                        '<div style="grid-column:span 2;"><label data-i18n="settings_path"></label><input type="text" data-field="path" value="' + escapeAttr(s.path || '') + '"></div>' +
                        '<div><label data-i18n="settings_pattern_glob"></label><input type="text" data-field="pattern_glob" value="' + escapeAttr(s.pattern || '') + '"></div>' +
                        '<div><label><input type="checkbox" data-field="recursive"' + (s.recursive ? ' checked' : '') + '> <span data-i18n="settings_recursive"></span></label></div>' +
                        '<div><label><input type="checkbox" data-field="read_compressed"' + (s.read_compressed ? ' checked' : '') + '> <span data-i18n="settings_read_compressed"></span></label></div>';
                } else {
                    typeBlock =
                        '<div><label data-i18n="settings_addr"></label><input type="text" data-field="addr" value="' + escapeAttr(s.addr || '') + '"></div>' +
                        '<div><label data-i18n="settings_proto"></label><select data-field="proto">' + protoSelect + '</select></div>';
                }
                return '<div class="source-row" data-i="' + i + '" style="border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px; margin-bottom:10px;">' +
                    '<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:10px; align-items:end;">' +
                    '<div><label data-i18n="settings_source_name"></label><input type="text" data-field="name" value="' + escapeAttr(s.name || '') + '"></div>' +
                    '<div><label data-i18n="settings_source_type"></label><div style="padding:6px;">' + escapeHtml(s.type) + '</div></div>' +
                    typeBlock +
                    '<div><label data-i18n="settings_engine"></label><select data-field="engine">' + engineSelect + '</select></div>' +
                    (isCustom
                        ? '<div style="grid-column:span 2;"><label data-i18n="settings_pattern"></label><input type="text" data-field="pattern" value="' + escapeAttr(s.format && s.format.pattern || '') + '"></div>'
                        : '<div><label data-i18n="settings_preset"></label><select data-field="preset">' + presetSelect + '</select></div>') +
                    '<div><button class="btn btn-secondary" onclick="removeSourceRow(' + i + ')" data-i18n="settings_remove"></button></div>' +
                    '</div></div>';
            }).join('');
            // Wire change listeners so edits flow back into settingsSources.
            host.querySelectorAll('.source-row').forEach(function(row) {
                const i = parseInt(row.getAttribute('data-i'), 10);
                row.querySelectorAll('[data-field]').forEach(function(el) {
                    el.addEventListener('change', function() {
                        const f = el.getAttribute('data-field');
                        let v = el.type === 'checkbox' ? el.checked : el.value;
                        const s = settingsSources[i];
                        if (f === 'engine' || f === 'preset' || f === 'pattern') {
                            s.format = s.format || {};
                            s.format[f] = v;
                            // Engine swap can change which preset list is valid;
                            // re-render so the dropdown updates.
                            if (f === 'engine') renderSourceRows();
                        } else if (f === 'pattern_glob') {
                            // The directory source's filename glob lives in
                            // `s.pattern`; we use a different data-field
                            // name so it doesn't collide with the
                            // custom-format `format.pattern` above.
                            s.pattern = v;
                        } else {
                            s[f] = v;
                        }
                    });
                });
            });
            applyLanguage();
        }

        function addSourceRow(type) {
            const row = {
                name: '',
                type: type,
                format: { engine: 'nginx', preset: 'combined' }
            };
            if (type === 'file') {
                row.path = '';
            } else if (type === 'dir') {
                row.path = '';
                row.pattern = 'access*.log*';
                row.recursive = false;
                row.read_compressed = false;
            } else if (type === 'syslog') {
                row.addr = ':1514';
                row.proto = 'udp';
            }
            settingsSources.push(row);
            renderSourceRows();
        }

        function removeSourceRow(i) {
            settingsSources.splice(i, 1);
            renderSourceRows();
        }

        async function loadSettings() {
            const errEl = document.getElementById('settingsError');
            const stEl = document.getElementById('settingsStatus');
            errEl.textContent = '';
            stEl.textContent = '';
            const res = await authFetch('/api/config');
            if (!res.ok) {
                errEl.textContent = 'failed to load config';
                return;
            }
            const data = await res.json();
            settingsSchema = data.schema || null;
            // Bootstrap (read-only).
            const b = data.bootstrap || {};
            document.getElementById('bootstrapListenAddr').textContent = b.listen_addr || '';
            document.getElementById('bootstrapDBPath').textContent = b.db_path || '';
            document.getElementById('bootstrapAllowedRoots').textContent = (b.allowed_log_roots || []).join(', ') || t('settings_any');
            // Runtime fields.
            const rc = data.runtime || {};
            document.getElementById('settingsWatch').checked = !!rc.watch;
            document.getElementById('settingsKeywords').value = (rc.keywords || []).join(', ');
            // Deep-copy sources so editing the form doesn't mutate the server snapshot.
            settingsSources = JSON.parse(JSON.stringify(rc.sources || []));
            renderSourceRows();
        }

        function collectRuntimePayload() {
            const watch = document.getElementById('settingsWatch').checked;
            const kwRaw = document.getElementById('settingsKeywords').value || '';
            const keywords = kwRaw.split(',').map(function(s){return s.trim();}).filter(function(s){return s.length > 0;});
            // Strip empty string fields that the server doesn't want
            // (e.g. addr on a file source from a stale form).
            const sources = settingsSources.map(function(s) {
                const out = { name: s.name || '', type: s.type, format: {} };
                out.format.engine = (s.format && s.format.engine) || 'auto';
                if (out.format.engine === 'custom') {
                    out.format.pattern = (s.format && s.format.pattern) || '';
                } else {
                    out.format.preset = (s.format && s.format.preset) || '';
                }
                if (s.type === 'file') {
                    out.path = s.path || '';
                    out.read_compressed = !!s.read_compressed;
                } else if (s.type === 'dir') {
                    out.path = s.path || '';
                    out.pattern = s.pattern || '';
                    out.recursive = !!s.recursive;
                    out.read_compressed = !!s.read_compressed;
                } else if (s.type === 'syslog') {
                    out.addr = s.addr || '';
                    out.proto = s.proto || 'udp';
                }
                return out;
            });
            return { watch: watch, keywords: keywords, sources: sources };
        }

        async function saveSettings() {
            const errEl = document.getElementById('settingsError');
            const stEl = document.getElementById('settingsStatus');
            errEl.textContent = '';
            stEl.textContent = '';
            const payload = collectRuntimePayload();
            const res = await authFetch('/api/config', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) {
                const data = await res.json().catch(function(){return {};});
                errEl.textContent = data.error || 'save failed';
                return;
            }
            stEl.textContent = t('settings_saved');
        }

        async function confirmRestart() {
            if (!confirm(t('settings_restart_confirm'))) return;
            const stEl = document.getElementById('settingsStatus');
            const errEl = document.getElementById('settingsError');
            errEl.textContent = '';
            stEl.textContent = t('settings_restarting');
            try {
                await authFetch('/api/admin/restart', { method: 'POST' });
            } catch (e) {
                // Connection dropping mid-restart is expected.
            }
            // Poll for the server to come back, then reload.
            const start = Date.now();
            (function poll() {
                if (Date.now() - start > 30000) {
                    errEl.textContent = t('settings_restart_timeout');
                    return;
                }
                fetch('/api/auth/me', { credentials: 'same-origin' }).then(function(r) {
                    if (r.ok || r.status === 401) {
                        window.location.reload();
                    } else {
                        setTimeout(poll, 1000);
                    }
                }).catch(function() {
                    setTimeout(poll, 1000);
                });
            })();
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('.theme-toggle').textContent = savedTheme === 'light' ? '🌙' : '☀️';
            applyLanguage();
            // Always start with the login overlay until /me confirms a session.
            showLogin();
            checkSession().then(function(ok) {
                if (ok) { loadStats(); }
            });
        });
    </script>
</body>
</html>
